name: Deploy backend-api-dev (dev)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_RESOURCE_NAME: acrdalryeodev
  ACR_LOGIN_SERVER: acrdalryeodev-caavfqd2d6e2e6f9.azurecr.io
  RESOURCE_GROUP: rg-dalryeo-dev
  CONTAINER_APP_NAME: backend-api-dev
  IMAGE_NAME: backend-api-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt

      - name: Debug ACR discovery
        run: |
          set -euxo pipefail
          az account show --query "{name:name, id:id, tenantId:tenantId}" -o json
          az acr show -n $ACR_RESOURCE_NAME --query "{name:name, loginServer:loginServer, resourceGroup:resourceGroup}" -o json

      - name: Docker login to ACR (token)
        run: |
          set -euxo pipefail
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          TOKEN=$(az acr login --name $ACR_RESOURCE_NAME --expose-token --output tsv --query accessToken)
          echo "$TOKEN" | docker login $ACR_LOGIN_SERVER --username 00000000-0000-0000-0000-000000000000 --password-stdin

      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Container App image
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ env.IMAGE_TAG }}
