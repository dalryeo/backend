spring:
  application:
    name: dalryeo

  # 데이터베이스 설정
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres.cqyvxgibytjjaeqcdvdy}
    password: ${DB_PASSWORD:runmorefast82}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # 웹 설정
  web:
    resources:
      add-mappings: false

  # Jackson 설정
  jackson:
#    serialization:
#      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

# 서버 설정
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-use-long-random-string-minimum-32-characters}
  access-token-expiration: 3600000  # 1시간 (밀리초)
  refresh-token-expiration: 604800000  # 7일 (밀리초)

# Apple OAuth 설정 (향후 확장용)
app:
  oauth:
    apple:
      dev-mode: ${APP_OAUTH_DEV_MODE:true}
      dev-apple-id-prefix: dev_user_

# 로깅 설정
logging:
  level:
    root: INFO
    com.ohgiraffers.dalryeo: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 액추에이터
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

