spring:
  application:
    name: dalryeo

  # 데이터베이스 설정
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # 웹 설정
  web:
    resources:
      add-mappings: false

  # Jackson 설정
  jackson:
#    serialization:
#      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

# 서버 설정
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-use-long-random-string-minimum-32-characters}
  access-token-expiration: 3600000  # 1시간 (밀리초)
  refresh-token-expiration: 604800000  # 7일 (밀리초)

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:https://api.dalryeo.store}
  oauth:
    apple:
      client-id: ${APP_OAUTH_APPLE_CLIENT_ID:}
      allowed-client-ids: ${APP_OAUTH_APPLE_ALLOWED_CLIENT_IDS:}
      jwk-set-uri: https://appleid.apple.com/auth/keys
      jwk-cache-ttl: 24h
      jwk-read-timeout: 2s
      clock-skew: 60s
  profile-image:
    upload-dir: ${PROFILE_IMAGE_UPLOAD_DIR:uploads/profile-images}
    url-prefix: /profiles/custom

# 로깅 설정
logging:
  level:
    root: INFO
    com.ohgiraffers.dalryeo: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 액추에이터
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: dalryeo

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:prod}
  release: ${SENTRY_RELEASE:local}
  send-default-pii: false

record:
  outbox:
    scheduler:
      enabled: ${RECORD_OUTBOX_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${RECORD_OUTBOX_SCHEDULER_FIXED_DELAY_MS:5000}
      batch-size: ${RECORD_OUTBOX_SCHEDULER_BATCH_SIZE:20}
      stale-timeout-seconds: ${RECORD_OUTBOX_STALE_TIMEOUT_SECONDS:300}
    retry:
      max-attempts: ${RECORD_OUTBOX_RETRY_MAX_ATTEMPTS:10}
      base-delay-seconds: ${RECORD_OUTBOX_RETRY_BASE_DELAY_SECONDS:30}
      max-delay-seconds: ${RECORD_OUTBOX_RETRY_MAX_DELAY_SECONDS:1800}
