spring:
  datasource:
    url: ${TEST_DB_URL:${DB_URL:}}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

app:
  public-base-url: https://api.dalryeo.store
  oauth:
    apple:
      client-id: test.apple.client
      jwk-set-uri: https://appleid.apple.com/auth/keys
      jwk-cache-ttl: 24h
      jwk-read-timeout: 2s
      clock-skew: 60s
  profile-image:
    upload-dir: build/test-uploads/profile-images
    url-prefix: /profiles/custom

record:
  outbox:
    scheduler:
      enabled: false
